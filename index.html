<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="referrer" content="strict-origin-when-cross-origin">
</head>
<body>
<script>
var p=new URLSearchParams(location.search);
var v=p.get("v");
var s=parseInt(p.get("start"),10)||0;
if(v&&/^[A-Za-z0-9_-]{11}$/.test(v)){
location.replace("https://www.youtube-nocookie.com/embed/"+v
+"?autoplay=1&controls=1&playsinline=1&rel=0&fs=0&start="+s);
}
</script>
</body>
</html>
